name: Generate Pacman Contribution Graph

on:
  schedule:
    - cron: "0 0 * * *" # araw-araw mag-run
  workflow_dispatch: # pwede mo rin i-run manually

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Generate Pacman graph
        uses: yoshi389111/github-contribution-graph@main
        with:
          user: BlueXhima
          theme: pacman
          output: ./output/pacman-contribution-graph.svg

      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/pacman-contribution-graph.svg
          git commit -m "Update Pacman contribution graph"
          git push
